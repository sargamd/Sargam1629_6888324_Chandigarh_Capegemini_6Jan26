<!DOCTYPE html>
<html>
<head>
    <title>Digital Greeting Card</title>

    <style>
        body{
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            font-family: 'Comic Sans MS', cursive;
            text-align: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card{
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0px 0px 15px gray;
            width: 350px;
        }

        h1{
            color: #ff4081;
        }

        p{
            font-size: 18px;
        }

        button{
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background-color: #ff4081;
            color: white;
            cursor: pointer;
            margin-top: 15px;
        }

        button:hover{
            background-color: #e91e63;
        }

        #surprise{
            margin-top: 20px;
            font-size: 20px;
            color: green;
            display: none;
        }
    </style>
</head>

<body>

<div class="card">

    <h1>🎉 Happy Birthday Moni! 🎂</h1>
    <p>Hope your day is filled with happiness and celebration!</p>

    <button onclick="showMessage()">Click for Surprise</button>

    <p id="surprise">🎁 M1 Cleared! Cheer Up! Party!</p>

</div>

<script>
function showMessage()
{
    document.getElementById("surprise").style.display = "block";
}
</script>

</body>
</html>
